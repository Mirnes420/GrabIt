<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - GrabIt DIY</title>
    <link rel="icon" type="image/png" href="./public/logo.png">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Force clear Light Mode styling overrides over the base stylesheet */
        :root {
            --bg-light: #ffffff;
            --card-light: #f8fafc;
            --border-light: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-blue: #2563eb;
            --accent-blue-hover: #1d4ed8;
            --alert-error: #dc2626;
            --alert-success: #16a34a;
        }

        body {
            background-color: var(--bg-light) !important;
            color: var(--text-main) !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .btn-dark {
            background-color: #0f172a !important; /* Deep charcoal/black */
            color: #ffffff !important;            /* White text */
            border: none !important;
        }

        .btn-dark:hover {
            background-color: #1e293b !important; /* Slightly lighter on hover so it acts responsive */
            color: #ffffff !important;
        }
        .auth-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            box-sizing: border-box;
        }

        .auth-card {
            background-color: var(--card-light) !important;
            border: 1px solid var(--border-light) !important;
            border-radius: 12px !important;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03) !important;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-img {
            max-height: 48px;
            width: auto;
            margin-bottom: 8px;
        }

        .profile-title {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
            color: var(--text-main) !important;
        }

        .profile-field {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .profile-field label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted) !important;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Highly structured style declarations to guarantee visibility over global sheets */
        .profile-field input {
            width: 100%;
            padding: 12px;
            background-color: #ffffff !important;
            border: 1px solid var(--border-light) !important;
            border-radius: 8px !important;
            color: var(--text-main) !important;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .profile-field input:focus:not(:disabled) {
            border-color: var(--accent-blue) !important;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1) !important;
        }

        /* Fixed visibility fallback targeting the disabled email input */
        .profile-field input:disabled {
            background-color: #e2e8f0 !important;
            color: #334155 !important;
            cursor: not-allowed;
            opacity: 1 !important;
            font-weight: 500;
            border-color: #cbd5e1 !important;
        }

        .alert-banner {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.4;
            display: none;
            text-align: left;
        }

        .alert-banner.error {
            background-color: #fef2f2 !important;
            border: 1px solid #fca5a5 !important;
            color: var(--alert-error) !important;
        }

        .alert-banner.success {
            background-color: #f0fdf4 !important;
            border: 1px solid #bbf7d0 !important;
            color: var(--alert-success) !important;
        }

        .profile-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: background-color 0.15s ease, border-color 0.15s ease;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--accent-blue) !important;
            color: #ffffff !important;
        }

        .btn-primary:hover {
            background-color: var(--accent-blue-hover) !important;
        }

        .btn-secondary {
            background-color: #ffffff !important;
            border: 1px solid var(--border-light) !important;
            color: var(--text-main) !important;
        }

        .btn-secondary:hover {
            background-color: #f8fafc !important;
            border-color: #cbd5e1 !important;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo-container">
                <img src="./public/logo.png" alt="GrabIt Logo" class="logo-img" onerror="this.style.display='none'">
                <h2 class="profile-title">Your Profile</h2>
            </div>

            <div id="profile-alert" class="alert-banner"></div>

            <div class="profile-field">
                <label for="profile-email">Email Address</label>
                <input type="text" id="profile-email" disabled>
            </div>
            
            <div class="profile-field">
                <label for="profile-name">Display Identity Name</label>
                <input type="text" id="profile-name" placeholder="Enter your display name">
            </div>
            
            <div class="profile-actions">
                <button id="save-profile-btn" class="btn btn-dark">Save Profile</button>
                <button id="back-home-btn" class="btn btn-secondary">Back to App</button>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_NGROK_DOMAIN = "cringing-niece-playpen.ngrok-free.dev";
        const profileAlert = document.getElementById('profile-alert');
        const emailInput = document.getElementById('profile-email');
        const nameInput = document.getElementById('profile-name');
        const saveBtn = document.getElementById('save-profile-btn');
        const backBtn = document.getElementById('back-home-btn');

        const userId = localStorage.getItem('grabit_tracked_user') || localStorage.getItem('user_id');
        const email = localStorage.getItem('grabit_user_email') || localStorage.getItem('user_email');

        if (!userId || userId === 'guest_user') {
            window.location.href = 'login.html';
        }

        if (emailInput) {
            emailInput.value = email || 'Unknown Email';
        }

        if (nameInput) {
            nameInput.value = localStorage.getItem('grabit_user_nickname') || '';
        }

        function showAlert(message, type = 'error') {
            if (!profileAlert) return;
            profileAlert.innerText = message;
            profileAlert.className = `alert-banner ${type}`;
            profileAlert.style.display = 'block';
        }

        async function loadProfile() {
            if (!userId) return;
            if (profileAlert) profileAlert.style.display = 'none';

            try {
                const response = await fetch(`https://${BACKEND_NGROK_DOMAIN}/api/users/profile/${encodeURIComponent(userId)}`);
                if (!response.ok) {
                    const errorText = await response.text().catch(() => response.statusText);
                    throw new Error(errorText || `HTTP ${response.status}`);
                }

                const data = await response.json();
                if (nameInput) {
                    nameInput.value = data.nickname || localStorage.getItem('grabit_user_nickname') || '';
                }
            } catch (err) {
                console.warn('Profile load issue:', err);
                if (!nameInput?.value) {
                    showAlert('Could not load profile configuration. Please refresh later.');
                }
            }
        }

        async function saveProfile() {
            if (!userId || !nameInput) return;
            const nickname = nameInput.value.trim();
            if (!nickname) {
                showAlert('Display name cannot be left empty.', 'error');
                return;
            }

            try {
                const response = await fetch(`https://${BACKEND_NGROK_DOMAIN}/api/users/update-profile`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, nickname })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || 'Update failed');
                }

                localStorage.setItem('grabit_user_nickname', nickname);
                showAlert('Profile saved successfully.', 'success');
            } catch (err) {
                showAlert('Failed to synchronize updates with profile database.', 'error');
            }
        }

        saveBtn.addEventListener('click', saveProfile);
        backBtn.addEventListener('click', () => window.location.href = 'app.html');

        window.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refill Tokens</title>
    <link rel="stylesheet" href="refill.css">
</head>

<body>
    <div class="refill-container">
        <img src="./public/logo.png" style="width: 100px;" alt="Logo" class="logo">
        <div class="header">
            <h1>Refill Tokens</h1>
            <p class="subtitle">Purchase more tokens to continue your live DIY sessions.</p>
        </div>

        <div class="balance-display">
            Current Balance: <span id="current-balance" class="token-balance">---</span>
        </div>

        <div class="packages-grid">
            <div class="package-card minimal-box">
                <h3>Starter Pack</h3>
                <div class="package-price">$5.00</div>
                <p class="token-amount">200,000 Tokens</p>
                <button class="btn btn-primary buy-btn" data-amount="200000" data-amount-cents="500">Buy Now</button>
            </div>

            <div class="package-card minimal-box best-buy">
                <div class="badge">Best Buy</div>
                <h3>Pro</h3>
                <div class="package-price">$15.00</div>
                <p class="token-amount">2,000,000 Tokens</p>
                <button class="btn btn-pro buy-btn" data-amount="2000000" data-amount-cents="1500">Buy Now</button>
            </div>

            <div class="package-card minimal-box">
                <h3>Contractor</h3>
                <div class="package-price">$40.00</div>
                <p class="token-amount">6,000,000 Tokens</p>
                <button class="btn btn-primary buy-btn" data-amount="6000000" data-amount-cents="4000">Buy Now</button>
            </div>
        </div>

        <div class="navigation-footer">
            <a href="app.html" class="link-btn">&lt;- Back to Assistant</a>
        </div>
    </div>
    <script src="refill.js"></script>
</body>

</html>
